{% extends "base.html" %}

{% block content %}
<section class="content-section" style="max-width: 800px;">
	<h2 class="section-title">Get in Touch</h2>
	<p class="text-muted" style="text-align: center; margin-bottom: 3rem; font-size: 1.1rem;">
		Have questions about our beans, sourcing, or wholesale partnerships? Send us a message below.
	</p>

	<form style="background: var(--color-offwhite); padding: 3rem; border: 1px solid var(--color-border);">
		<div style="margin-bottom: 1.5rem;">
			<label class="form-label" for="name">Your Name</label>
			<input class="form-control" type="text" id="name" placeholder="First and Last Name" required>
		</div>
		<div style="margin-bottom: 1.5rem;">
			<label class="form-label" for="email">Email Address</label>
			<input class="form-control" type="email" id="email" placeholder="you@example.com" required>
		</div>
		<div style="margin-bottom: 2rem;">
			<label class="form-label" for="message">Message</label>
			<textarea class="form-control" id="message" rows="5" placeholder="How can we help?" required></textarea>
		</div>
		<button type="submit" class="btn-primary">Send Message</button>
	</form>
</section>
{% endblock %}
