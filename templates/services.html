{% extends "base.html" %}

{% block content %}
<section class="content-section">
  <h2 class="section-title">Our Services</h2>
  <div class="item-grid">
    {% for service in service_items %}
    <div class="item-card">
      <h4>{{ service.name }}</h4>
      <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 1.5rem; flex: 1;">{{ service.description }}</p>
      <div style="border-top: 1px solid var(--color-border); padding-top: 1.25rem; margin-top: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <div class="item-price" style="margin: 0;">₱{{ service.price }}</div>
          <span style="
                        font-family: 'Oswald', sans-serif;
                        font-size: 0.75rem;
                        text-transform: uppercase;
                        letter-spacing: 1px;
                        padding: 0.3rem 0.75rem;
                        border: 1px solid var(--color-border);
                        color: #555;
                    ">{{ service.availability }}</span>
        </div>
        <p class="text-muted" style="font-size: 0.8rem; margin: 0;">
          <span
            style="font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 1px;">Duration:</span>
          {{ service.duration }}
        </p>
      </div>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
