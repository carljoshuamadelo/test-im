{% extends "base.html" %}

{% block content %}

<div class="form-page">
    <div class="form-card" id="editFormCard">

        <!-- Header -->
        <div class="form-card-header">
            <span class="form-type-badge badge-lost">✏️ Edit Item</span>
            <h1>Edit: {{ item.title }}</h1>
            <p>Update the item details below.</p>
        </div>

        <!-- Alerts -->
        {% if error %}
        <div class="alert alert-danger" role="alert">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success" role="alert">
            ✅ {{ success }}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="{{ base_url }}/admin/edit/{{ item.id }}" id="editForm"
              enctype="multipart/form-data" novalidate>

            <!-- Item Title -->
            <div class="form-group">
                <label class="form-label" for="title">
                    Item Name / Title <span class="req">*</span>
                </label>
                <input type="text" class="form-control" id="title" name="title"
                       value="{{ item.title }}" required>
            </div>

            <!-- Type + Status -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="type">Type</label>
                    <select class="form-control" id="type" name="type">
                        <option value="lost" {% if item.type == 'lost' %}selected{% endif %}>Lost</option>
                        <option value="found" {% if item.type == 'found' %}selected{% endif %}>Found</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="publish_status">Status</label>
                    <select class="form-control" id="publish_status" name="publish_status">
                        <option value="pending" {% if item.publish_status == 'pending' %}selected{% endif %}>Pending</option>
                        <option value="published" {% if item.publish_status == 'published' %}selected{% endif %}>Published</option>
                        <option value="claimed" {% if item.publish_status == 'claimed' %}selected{% endif %}>Claimed</option>
                        <option value="archived" {% if item.publish_status == 'archived' %}selected{% endif %}>Archived</option>
                    </select>
                </div>
            </div>

            <!-- Category + Date -->
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="category">
                        Category <span class="req">*</span>
                    </label>
                    <select class="form-control" id="category" name="category" required>
                        <option value="">Select category…</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}"
                            {% if item.category == cat %}selected{% endif %}>
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="date">
                        Date <span class="req">*</span>
                    </label>
                    <input type="date" class="form-control" id="date" name="date"
                           value="{{ item.date }}" required>
                </div>
            </div>

            <!-- Location -->
            <div class="form-group">
                <label class="form-label" for="location">
                    Location <span class="req">*</span>
                </label>
                <input type="text" class="form-control" id="location" name="location"
                       value="{{ item.location }}" required>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label class="form-label" for="description">
                    Description <span class="req">*</span>
                </label>
                <textarea class="form-control" id="description" name="description"
                          rows="4" required>{{ item.description }}</textarea>
            </div>

            <!-- Contact -->
            <div class="form-group">
                <label class="form-label" for="contact">
                    Contact Information <span class="req">*</span>
                </label>
                <input type="text" class="form-control" id="contact" name="contact"
                       value="{{ item.contact }}" required>
            </div>

            <!-- Current Image -->
            {% if item.image %}
            <div class="form-group">
                <label class="form-label">Current Image</label>
                <div style="margin-bottom: 10px;">
                    <img src="{{ item.image }}" alt="{{ item.title }}" style="max-height: 150px; border-radius: 10px;">
                </div>
            </div>
            {% endif %}

            <!-- New Image Upload -->
            <div class="form-group">
                <label class="form-label" for="image">
                    📷 Replace Image <span style="color:var(--text-muted);font-weight:400;font-size:0.82rem;">(Optional — leave empty to keep current)</span>
                </label>
                <input type="file" id="image" name="image" accept=".png,.jpg,.jpeg,.gif,.webp"
                       class="form-control">
            </div>

            <!-- Submit -->
            <button type="submit" class="submit-btn" id="submitEditBtn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                💾 Save Changes
            </button>
        </form>

        <!-- Back link -->
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="{{ base_url }}/admin" class="back-link">
                ← Back to Admin Dashboard
            </a>
        </div>

    </div>
</div>

{% endblock %}
